            </tr>

        </Table>
      </Panel>
    </div>
  );
};

function App() {
  const [user, setUser] = useState(null);

  const [authMode, setAuthMode] = useState("login"); // login | signup | forgot | otp
  const [screen, setScreen] = useState("dashboard");
  const [openNavItems, setOpenNavItems] = useState({});
  const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
  const [toasts, setToasts] = useState([]);
  const [clock, setClock] = useState("--:--:-- IST");
  const [theme, setTheme] = useState("dark"); // "dark" | "light"
  const [loginId, setLoginId] = useState("");
  const [loginPw, setLoginPw] = useState("");
  const [signupData, setSignupData] = useState({ mobile: "", name: "", email: "", accountType: "individual", password: "", confirmPw: "" });
  const [otpCode, setOtpCode] = useState(["", "", "", "", "", ""]);
  const [forgotEmail, setForgotEmail] = useState("");
  const [loginError, setLoginError] = useState("");
  const toastIdRef = useRef(0);
  const otpRefs = useRef([]);

  // Assign active theme to module-level C so all components read current palette
  C = THEMES[theme];
  const toggleTheme = () => setTheme((p) => (p === "dark" ? "light" : "dark"));

  const addToast = useCallback((msg, type = "i") => {
    const id = ++toastIdRef.current;
    setToasts((prev) => [...prev, { id, msg, type }]);
    setTimeout(() => setToasts((prev) => prev.filter((t) => t.id !== id)), 3000);
  }, []);

  useEffect(() => {
    const tick = () => {
      const now = new Date();
      const ist = new Date(now.getTime() + 5.5 * 3600000);
      const p = (n) => String(n).padStart(2, "0");
      setClock(`${p(ist.getUTCHours())}:${p(ist.getUTCMinutes())}:${p(ist.getUTCSeconds())} IST`);
    };
    tick();
    const iv = setInterval(tick, 1000);
    return () => clearInterval(iv);
  }, []);

  const doLogin = () => {
    setLoginError("");
    if (!loginId || !loginPw) { setLoginError("Please enter your credentials"); return; }
    if ((loginType === "admin" || loginType === "partner") && !loginId.includes("@")) { setLoginError("Login requires a valid email address"); return; }
    if (loginPw.length < 4) { setLoginError("Password must be at least 8 characters"); return; }
    addToast(`Login attempt logged -- ${loginType} portal -- ${new Date().toLocaleString("en-IN")}`, "i");
    setUser({
      name: loginType === "admin" ? "Raghav S." : loginType === "partner" ? "Partner Admin" : "Rajesh Kumar",
      role: loginType === "admin" ? "Super Admin" : loginType === "partner" ? "Partner Admin" : "Individual Client",
      type: loginType,
      id: loginType === "admin" ? "ADMIN001" : loginType === "partner" ? "PARTNER001" : "260116100001",
    });
    setScreen("dashboard");
    setLoginError("");
    addToast("Welcome back! Signed in successfully.", "s");
  };

  const doSignup = () => {
    setLoginError("");
    const { mobile, name, password, confirmPw } = signupData;
    if (!mobile || mobile.length < 10) { setLoginError("Enter a valid 10-digit mobile number"); return; }
    if (!name || name.length < 2) { setLoginError("Enter your full name"); return; }
    if (!password || password.length < 8) { setLoginError("Password must be at least 8 characters"); return; }
    if (password !== confirmPw) { setLoginError("Passwords do not match"); return; }
    setAuthMode("otp");
    addToast(`OTP sent to +91 ${mobile}`, "s");
  };

  const verifyOtp = () => {
    const code = otpCode.join("");
    if (code.length < 6) { setLoginError("Enter the complete 6-digit OTP"); return; }
    setUser({
      name: signupData.name, role: signupData.accountType === "individual" ? "Individual Client" : "Corporate Client",
      type: "client", id: "260116100099",
    });
    setScreen("dashboard");
    addToast("Account created successfully! Complete your KYC to get started.", "s");
  };

  const handleOtpInput = (idx, val) => {
    if (val.length > 1) val = val.slice(-1);
    if (val && !/^\d$/.test(val)) return;
    const newOtp = [...otpCode]; newOtp[idx] = val; setOtpCode(newOtp);
    if (val && idx < 5 && otpRefs.current[idx + 1]) otpRefs.current[idx + 1].focus();
  };

  const doForgotPassword = () => {
    if (!forgotEmail) { setLoginError("Enter your registered email or mobile"); return; }

                </div>

                <button onClick={doForgotPassword} style={primaryBtn}>Send Reset Link</button>

                <div style={{ textAlign: "center", marginTop: 14 }}>
                  <button onClick={() => { setAuthMode("login"); setLoginError(""); }} style={linkStyle}>Back to Sign In</button>
                </div>
              </React.Fragment>
            )}
          </div>
        </div>
        <ToastContainer toasts={toasts} />
      </div>
    );
  }

  //  Main App 
  const responsiveCSS = `
    select option { background: ${theme === "dark" ? "#1a1a2e" : "#ffffff"}; color: ${theme === "dark" ? "#ffffff" : "#0F172A"}; padding: 8px 12px; }
    select option:checked { background: ${theme === "dark" ? "#0093B6" : "#0077A8"}; color: #ffffff; }
    select { color-scheme: ${theme === "dark" ? "dark" : "light"}; }
    .app-sidebar { width: 280px; min-width: 280px; display: flex; }
    .app-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
    .app-topbar { height: 64px; }
    .app-content { padding: 20px 24px; }
    .mobile-menu-btn { display: none; }
    .mobile-overlay { display: none; }
    @media (max-width: 1023px) {
      .app-sidebar { width: 240px; min-width: 240px; }
      .app-content { padding: 16px 18px; }
      .kcard { padding: 14px 15px !important; }
    }
    @media (max-width: 768px) {
      .app-sidebar {
        position: fixed !important; top: 0; left: 0; bottom: 0; z-index: 100 !important;
        width: 280px !important; min-width: 280px !important;
        transform: translateX(-100%); transition: transform 0.3s ease;
        flex-direction: column !important; border-right: 1px solid rgba(0,147,182,.2) !important;
        height: 100vh !important; max-height: 100vh !important; overflow-y: auto !important;
      }
      .app-sidebar.open { transform: translateX(0); }
      .mobile-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 99; backdrop-filter: blur(4px); }
      .mobile-overlay.open { display: block; }
      .mobile-menu-btn { display: flex !important; }
      .app-content { padding: 14px 16px; }
      .app-topbar { height: 56px; }
      .panel { margin-bottom: 12px !important; }
      .resp-table { font-size: 13px; }
      .info-grid { grid-template-columns: 1fr !important; }
    }
    @media (max-width: 640px) {
      .app-content { padding: 12px 12px; }
      .kcard { padding: 12px 14px !important; }
    }
    @media (min-width: 1280px) {
      .app-content { max-width: 1200px; }
    }
  `;

  return (
    <div style={{ fontFamily: "'Inter',sans-serif", fontSize: 16, background: C.bg, color: C.t, minHeight: "100vh", lineHeight: 1.5 }}>
      <style dangerouslySetInnerHTML={{ __html: responsiveCSS }} />
      <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
      
      {/* Background */}
      <div style={{ position: "fixed", inset: 0, zIndex: 0, pointerEvents: "none", background: C.radialBg }} />
      <div style={{ position: "fixed", inset: 0, zIndex: 0, pointerEvents: "none", backgroundImage: `linear-gradient(${C.gridLine} 1px,transparent 1px),linear-gradient(90deg,${C.gridLine} 1px,transparent 1px)`, backgroundSize: "44px 44px" }} />

      <div className="app-layout" style={{ display: "flex", height: "100vh", position: "relative", zIndex: 1 }}>
        {/*  Mobile Overlay  */}
        <div className={`mobile-overlay${mobileMenuOpen ? " open" : ""}`} onClick={() => setMobileMenuOpen(false)} />
        
        {/*  Sidebar  */}
        <aside className={`app-sidebar${mobileMenuOpen ? " open" : ""}`} style={{ background: C.bgs, borderRight: `1px solid ${C.bd}`, flexDirection: "column", overflow: "hidden", position: "relative", zIndex: 20 }}>
          <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 1, background: `linear-gradient(90deg,transparent 5%,${C.p} 50%,transparent 95%)`, opacity: 0.7 }} />
          
          {/* Logo + Mobile Close */}
          <div className="sidebar-logo" style={{ padding: "14px 18px 12px", borderBottom: `1px solid ${C.bdf}`, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <img src={LOGO} alt="AntMeta" style={{ height: 38, objectFit: "contain" }} />
            <button className="mobile-menu-btn" onClick={() => setMobileMenuOpen(false)} style={{ background: "rgba(0,147,182,.1)", border: `1px solid ${C.bd}`, borderRadius: 8, width: 36, height: 36, alignItems: "center", justifyContent: "center", cursor: "pointer", color: C.t2 }}>
              <svg width={18} height={18} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeWidth={2} d="M6 6l12 12M18 6L6 18" /></svg>
            </button>
          </div>

          {/* User chip */}
          <div className="sidebar-user" style={{ margin: "10px 12px 6px", padding: "8px 10px", background: "rgba(0,147,182,.07)", border: `1px solid ${C.bd}`, borderRadius: 10, display: "flex", alignItems: "center", gap: 9 }}>
            <div style={{ width: 28, height: 28, borderRadius: "50%", background: `linear-gradient(135deg,${C.p},${C.s})`, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'Poppins',sans-serif", fontSize: 12, fontWeight: 700, color: "#fff", border: "1.5px solid rgba(0,147,182,.4)" }}>
              {user.name.split(" ").map((w) => w[0]).join("").slice(0, 2).toUpperCase()}
            </div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 14, fontWeight: 600, color: C.t }}>{user.name}</div>
              <div style={{ fontSize: 13, color: C.p, marginTop: 1 }}>{user.role}</div>
              {user.type === "partner" && <div style={{ fontSize: 12, color: C.su, marginTop: 2, display: "flex", alignItems: "center", gap: 4 }}><svg width={10} height={10} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth={2}><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>Managing: 5 Clients</div>}
            </div>
            <div style={{ width: 7, height: 7, borderRadius: "50%", background: C.su, flexShrink: 0 }} />
          </div>

          {/* Navigation */}
          <nav className="sidebar-nav" style={{ flex: 1, overflowY: "auto", padding: "6px 0 10px" }}>
            {navConfig.map((item) => {
              let curSec = null;
              return (
                <div key={item.id}>
                  {item.sec && (
                    <div style={{ fontFamily: "'Poppins',sans-serif", fontSize: 12, fontWeight: 700, letterSpacing: 2.5, textTransform: "uppercase", color: C.t3, padding: "12px 16px 5px", userSelect: "none" }}>{item.sec}</div>
                  )}
                  <div style={{ margin: "1px 6px", borderRadius: 9, position: "relative" }}>
                    {(screen === item.id || item.sub && item.sub.some((s) => s.id === screen)) && (
                      <div style={{ position: "absolute", left: 0, top: "50%", transform: "translateY(-50%)", width: 3, height: "56%", background: C.p, borderRadius: "0 3px 3px 0" }} />
                    )}
                    <div onClick={() => {
                      if (item.sub) {
                        setOpenNavItems((prev) => ({ ...prev, [item.id]: !prev[item.id] }));
                      } else {
                        setScreen(item.id);
                        setMobileMenuOpen(false);
                      }
                    }} style={{
                      display: "flex", alignItems: "center", gap: 9, padding: "9px 12px", borderRadius: 9, cursor: "pointer", transition: "all .18s",
                      background: (screen === item.id || item.sub && item.sub.some((s) => s.id === screen)) ? `linear-gradient(135deg,rgba(0,147,182,.18),rgba(0,150,136,.08))` : "transparent",
                      border: (screen === item.id || item.sub && item.sub.some((s) => s.id === screen)) ? "1px solid rgba(0,147,182,.22)" : "1px solid transparent",
                    }}>
                      <svg width={16} height={16} fill="none" stroke="currentColor" viewBox="0 0 24 24" style={{ color: (screen === item.id || item.sub && item.sub.some((s) => s.id === screen)) ? C.p : C.t3, flexShrink: 0 }}>
                        {Icons[item.ico]}
                      </svg>
                      <span style={{ fontSize: 14, fontWeight: (screen === item.id || item.sub && item.sub.some((s) => s.id === screen)) ? 600 : 500, color: (screen === item.id || item.sub && item.sub.some((s) => s.id === screen)) ? C.t : C.t2, flex: 1 }}>{item.label}</span>
                      {item.badge && <span style={{ fontSize: 13, fontWeight: 700, padding: "2px 7px", borderRadius: 8, background: item.bt === "warn" ? C.gl : item.bt === "bad" ? C.dl : C.pl, color: item.bt === "warn" ? C.go : item.bt === "bad" ? C.da : C.p }}>{item.badge}</span>}
                      {item.sub && (
                        <svg width={12} height={12} fill="none" stroke="currentColor" viewBox="0 0 24 24" style={{ color: C.t3, transition: "transform .2s", transform: openNavItems[item.id] ? "rotate(90deg)" : "none", flexShrink: 0 }}>
                          {Icons.chevron}
                        </svg>
                      )}
                    </div>
                    {item.sub && openNavItems[item.id] && (
                      <div style={{ padding: "2px 0 3px 30px" }}>
                        {item.sub.map((sub) => (
                          <div key={sub.id} onClick={() => { setScreen(sub.id); setMobileMenuOpen(false); }} style={{ display: "flex", alignItems: "center", gap: 7, padding: "8px 10px", margin: "1px 5px 1px 0", borderRadius: 7, cursor: "pointer", fontSize: 14, color: screen === sub.id ? C.p : C.t2, fontWeight: screen === sub.id ? 600 : 400, background: screen === sub.id ? "rgba(0,147,182,.07)" : "transparent" }}>
                            <span style={{ width: 5, height: 5, borderRadius: "50%", background: "currentColor", opacity: screen === sub.id ? 1 : 0.4, flexShrink: 0 }} />
                            {sub.label}
                            {sub.badge && <span style={{ marginLeft: "auto", fontSize: 13, fontWeight: 700, padding: "2px 7px", borderRadius: 8, background: sub.bt === "warn" ? C.gl : C.pl, color: sub.bt === "warn" ? C.go : C.p }}>{sub.badge}</span>}
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>
              );
            })}
          </nav>

          {/* Footer */}
          <div className="sidebar-footer" style={{ padding: "10px 14px", borderTop: `1px solid ${C.bdf}`, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 14, color: C.t }}>
              <div style={{ width: 7, height: 7, borderRadius: "50%", background: C.su, flexShrink: 0 }} />
              Online
            </div>
            <button onClick={toggleTheme} title={theme === "dark" ? "Switch to Light Mode" : "Switch to Dark Mode"} style={{ display: "flex", alignItems: "center", justifyContent: "center", width: 32, height: 32, borderRadius: 8, background: C.inputBg, border: `1px solid ${C.bd}`, cursor: "pointer", color: C.t }}>
              {theme === "dark" ? (
                <svg width={16} height={16} fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5" strokeWidth="2"/><path strokeLinecap="round" strokeWidth="2" d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
              ) : (
                <svg width={16} height={16} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
              )}
            </button>
            <button onClick={doLogout} style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 14, color: C.t, cursor: "pointer", padding: "6px 10px", borderRadius: 6, background: "none", border: "none" }}>
              <Icon name="logout" size={14} />
              Logout
            </button>
          </div>
        </aside>

        {/*  Main Content  */}
        <div className="app-main">
          {/* Topbar */}
          <div className="app-topbar" style={{ flexShrink: 0, display: "flex", alignItems: "center", gap: 12, padding: "0 24px", background: C.topbarBg, backdropFilter: "blur(12px)", borderBottom: `1px solid ${C.bd}`, position: "sticky", top: 0, zIndex: 15 }}>
            {/* Mobile hamburger */}
            <button className="mobile-menu-btn" onClick={() => setMobileMenuOpen(true)} style={{ background: "rgba(0,147,182,.1)", border: `1px solid ${C.bd}`, borderRadius: 8, width: 40, height: 40, alignItems: "center", justifyContent: "center", cursor: "pointer", color: C.t, flexShrink: 0, marginRight: 4 }}>
              <svg width={20} height={20} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" /></svg>
            </button>
            <div style={{ flex: 1, minWidth: 0 }}>
              <h1 style={{ fontFamily: "'Poppins',sans-serif", fontSize: 22, fontWeight: 800, color: C.t, margin: 0, letterSpacing: "-0.3px" }}>{TITLES[screen] || screen}</h1>
              <div style={{ fontSize: 14, color: C.t3, marginTop: 2 }}>traders.antmeta.ai  <span style={{ color: C.p }}>{user.type === "admin" ? "Admin Panel" : user.type === "partner" ? "Partner Admin" : "Client Portal"} / {TITLES[screen] || screen}</span></div>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 7, background: C.inputBg, border: `1px solid ${C.bd}`, borderRadius: 8, padding: "8px 14px", width: 220 }}>
              <Icon name="search" size={14} />
              <input placeholder="Search clients, IDs, PAN" style={{ background: "none", border: "none", outline: "none", fontFamily: "'Inter',sans-serif", fontSize: 14, color: C.t2, width: "100%" }} />
            </div>
            <div style={{ width: 36, height: 36, borderRadius: 8, background: "rgba(0,147,182,.07)", border: `1px solid ${C.bd}`, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", position: "relative" }}>
              <Icon name="bell" size={16} />
              <div style={{ position: "absolute", top: 5, right: 5, width: 7, height: 7, borderRadius: "50%", background: C.da, border: `1.5px solid ${C.bgs}` }} />
            </div>
            <button onClick={toggleTheme} title={theme === "dark" ? "Switch to Light Mode" : "Switch to Dark Mode"} style={{ width: 36, height: 36, borderRadius: 8, background: C.inputBg, border: `1px solid ${C.bd}`, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", color: C.t, flexShrink: 0 }}>
              {theme === "dark" ? (
                <svg width={16} height={16} fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5" strokeWidth="2"/><path strokeLinecap="round" strokeWidth="2" d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
              ) : (
                <svg width={16} height={16} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
              )}
            </button>
            <div style={{ fontSize: 14, color: C.t3, background: C.inputBg, border: `1px solid ${C.bd}`, padding: "6px 12px", borderRadius: 8, fontFeatureSettings: '"tnum"', whiteSpace: "nowrap" }}>{clock}</div>
          </div>

          {/* Page Content */}
          <div className="app-content" style={{ flex: 1, overflowY: "auto", scrollBehavior: "smooth" }}>
            {renderScreen()}
          </div>
        </div>
      </div>

      <ToastContainer toasts={toasts} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
